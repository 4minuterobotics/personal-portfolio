name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

# If a deploy is already running and a new commit lands, cancel the
# in-flight one. Avoids two CI runs racing each other on the FTP side.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production
          # EmailJS credentials get inlined into the JS bundle at build time.
          # Public-key-class secrets, but still managed via GitHub Secrets so
          # they don't live in the repo. Add these in repo Settings → Secrets.
          VITE_APP_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          VITE_APP_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          VITE_APP_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}

      - name: Deploy to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          protocol: ftps
          port: 21
          log-level: minimal
          # dangerous-clean-slate defaults to false — only changed files
          # are uploaded, the remote dir is NOT wiped before each deploy.
